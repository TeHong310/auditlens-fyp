<div class="page-wrapper">
  <div class="success-container">

    <div class="check-circle">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="32" fill="#4A90D9" opacity="0.15"/>
        <circle cx="32" cy="32" r="24" fill="#4A90D9" opacity="0.25"/>
        <circle cx="32" cy="32" r="16" fill="#4A90D9"/>
        <polyline points="22,32 29,39 42,25" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="success-title">Registration Successful</h1>
    <p class="success-desc">Your AuditLens account has been created successfully.</p>
    <p class="success-desc">You can now sign in and access your workspace.</p>

    <div class="info-box">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="8" stroke="#4A90D9" stroke-width="1.5"/>
        <line x1="9" y1="8" x2="9" y2="13" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="9" cy="5.5" r="0.75" fill="#4A90D9"/>
      </svg>
      <span>Role-based access will be applied after sign in</span>
    </div>

    <div class="btn-row">
      <button class="btn-back" (click)="goToRegister()">Back to Register</button>
      <button class="btn-signin" (click)="goToLogin()">Go to Sign In</button>
    </div>

  </div>
</div>
