<div class="page-wrapper">
  <div class="success-container">

    <div class="check-circle">
      <i class="ph-duotone ph-check-circle" style="font-size:64px; color:var(--accent);"></i>
    </div>

    <h1 class="success-title">Registration Successful</h1>
    <p class="success-desc">Your AuditLens account has been created successfully.</p>
    <p class="success-desc">You can now sign in and access your workspace.</p>

    <div class="info-box">
      <i class="ph-duotone ph-info" style="font-size:18px; color:var(--accent);"></i>
      <span>Role-based access will be applied after sign in</span>
    </div>

    <div class="btn-row">
      <button class="btn-back" (click)="goToRegister()">Back to Register</button>
      <button class="btn-signin" (click)="goToLogin()">Go to Sign In</button>
    </div>

  </div>
</div>
