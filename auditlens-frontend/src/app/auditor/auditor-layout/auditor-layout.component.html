<div class="layout-wrapper">

  <button class="hamburger" (click)="toggleSidebar()" aria-label="Menu">☰</button>

  <div class="sidebar-overlay" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>

  <div class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-top">
      <div class="sidebar-logo">
        <img src="logo.png" alt="AuditLens" class="sidebar-logo-img"/>
      </div>

      <nav class="sidebar-nav">
        <a *ngFor="let item of navItems"
           [routerLink]="item.route"
           class="nav-item"
           [class.active]="isActive(item.route)"
           (click)="closeSidebar()">

          <!-- Home icon -->
          <svg *ngIf="item.icon === 'home'" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 7L9 2l7 5v9a1 1 0 01-1 1H3a1 1 0 01-1-1V7z"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 16v-6h4v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>

          <!-- Review icon -->
          <svg *ngIf="item.icon === 'review'" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 9l2 2 4-4" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- Record Detail icon -->
          <svg *ngIf="item.icon === 'record'" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 6h8M5 9h6M5 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>

          <!-- Exceptions icon -->
          <svg *ngIf="item.icon === 'exceptions'" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M9 5v5M9 12v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>

          <!-- Report icon -->
          <svg *ngIf="item.icon === 'report'" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="2" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 6h6M6 9h6M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>

          <!-- Anomaly Detection icon (spark) -->
          <svg *ngIf="item.icon === 'anomaly'" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2l1.5 4.5L15 8l-4.5 1.5L9 14l-1.5-4.5L3 8l4.5-1.5L9 2z"
                  stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M14.5 12.5v3M13 14h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>

          <!-- Authenticity icon (shield) -->
          <svg *ngIf="item.icon === 'authenticity'" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2l6 2v4.5c0 3.5-2.5 6-6 7.5-3.5-1.5-6-4-6-7.5V4l6-2z"
                  stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M6.5 9l1.8 1.8L11.5 7" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <span>{{ item.label }}</span>
        </a>
      </nav>
    </div>

    <!-- Sidebar Bottom -->
    <div class="sidebar-bottom">
      <div class="user-menu-wrapper">

        <!-- Logout Dropdown -->
        <div class="user-menu" *ngIf="showUserMenu">
          <button class="user-menu-item logout" (click)="logout()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Logout
          </button>
        </div>

        <!-- User Info -->
        <div class="user-info" (click)="toggleUserMenu()">
          <div class="user-avatar">{{ getInitial() }}</div>
          <div class="user-details">
            <p class="user-name">{{ user?.full_name || 'Auditor' }}</p>
            <p class="user-role">Auditor</p>
          </div>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="margin-left:auto; flex-shrink:0;">
            <path d="M3 5l4 4 4-4" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>

</div>
