<div class="page-wrapper">

  <div class="left-panel">
    <div class="brand-header">
      <h1 class="brand-title">AuditLens</h1>
      <p class="brand-subtitle">Intelligent Audit Verification</p>
    </div>

    <div class="logo-container">
      <div class="logo-icon">
        <img src="logo.png" alt="AuditLens Logo" class="real-logo" />
      </div>
    </div>

    <div class="features-list">
      <div class="feature-item">
        <span class="dot"></span>
        <span>AI-Powered OCR &amp; Document Analysis</span>
      </div>
      <div class="feature-item">
        <span class="dot"></span>
        <span>Real-Time Financial Verification</span>
      </div>
      <div class="feature-item">
        <span class="dot"></span>
        <span>Enterprise-Grade Security</span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="register-card">
      <div class="card-header">
        <h2 class="card-title">Create your account</h2>
        <p class="card-subtitle">Register to start your audit workflow</p>
      </div>

      <div class="success-box" *ngIf="successMessage">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#16a34a" stroke-width="1.5"/>
          <polyline points="4.5,8 7,10.5 11.5,5.5" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        {{ successMessage }}
      </div>

      <div class="error-box" *ngIf="errorMessage">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#e53e3e" stroke-width="1.5"/>
          <line x1="8" y1="5" x2="8" y2="9" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="11.5" r="0.75" fill="#e53e3e"/>
        </svg>
        {{ errorMessage }}
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="5" r="3" stroke="#9CA3AF" stroke-width="1.5"/>
              <path d="M2 14c0-3 2.5-5 6-5s6 2 6 5" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" class="form-input" placeholder="Your full name" [(ngModel)]="fullName" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Work email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="3" width="14" height="10" rx="2" stroke="#9CA3AF" stroke-width="1.5"/>
              <polyline points="1,5 8,9 15,5" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="email" class="form-input" placeholder="name@company.com" [(ngModel)]="email" />
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="#9CA3AF" stroke-width="1.5"/>
              <path d="M5 7V5a3 3 0 016 0v2" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" class="form-input" placeholder="Create password" [(ngModel)]="password" />
            <button class="eye-btn" type="button" (click)="togglePassword()">
              <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 3C4 3 1 8 1 8s3 5 7 5 7-5 7-5-3-5-7-5z" stroke="#9CA3AF" stroke-width="1.5"/>
                <circle cx="8" cy="8" r="2" stroke="#9CA3AF" stroke-width="1.5"/>
              </svg>
              <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 2l12 12M8 3C4 3 1 8 1 8s.8 1.3 2.2 2.6M6.3 6.3A2 2 0 0110 8a2 2 0 01-.3 1M12.5 10.5C13.7 9.2 15 8 15 8s-3-5-7-5a6.2 6.2 0 00-1.5.2" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="#9CA3AF" stroke-width="1.5"/>
              <path d="M5 7V5a3 3 0 016 0v2" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-input" placeholder="Confirm password" [(ngModel)]="confirmPassword" />
            <button class="eye-btn" type="button" (click)="toggleConfirmPassword()">
              <svg *ngIf="!showConfirmPassword" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 3C4 3 1 8 1 8s3 5 7 5 7-5 7-5-3-5-7-5z" stroke="#9CA3AF" stroke-width="1.5"/>
                <circle cx="8" cy="8" r="2" stroke="#9CA3AF" stroke-width="1.5"/>
              </svg>
              <svg *ngIf="showConfirmPassword" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 2l12 12M8 3C4 3 1 8 1 8s.8 1.3 2.2 2.6M6.3 6.3A2 2 0 0110 8a2 2 0 01-.3 1M12.5 10.5C13.7 9.2 15 8 15 8s-3-5-7-5a6.2 6.2 0 00-1.5.2" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Role Dropdown - full width -->
      <div class="form-group">
        <label class="form-label">Select your role</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5" r="3" stroke="#9CA3AF" stroke-width="1.5"/>
            <path d="M2 14c0-3 2.5-5 6-5s6 2 6 5" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <select class="form-input form-select" [(ngModel)]="role">
            <option value="" disabled selected>Select role</option>
            <option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</option>
          </select>
        </div>
      </div>

      <div class="terms-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="agreeTerms" class="checkbox-input" />
          <span class="checkbox-custom"></span>
          <span>I agree to the <a href="#" class="terms-link">terms and privacy policy</a></span>
        </label>
      </div>

      <button class="btn-create" (click)="onRegister()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading" class="loading-spinner"></span>
      </button>

      <p class="login-link">
        Already have an account?
        <a (click)="goToLogin()" style="cursor:pointer">Sign In</a>
      </p>
    </div>
  </div>

</div>
